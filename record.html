<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitnessPal</title>
    <link rel="stylesheet" href="main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
      <div class="container">
        <a href="index.html" class="navbar-brand">FitnessPal</a>

        <button 
        class="navbar-toggler"
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navmenu"
        >
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="record.html" class="nav-link">Record</a>
            </li>
            <li class="nav-item">
              <a href="progress.html" class="nav-link">Progress</a>
            </li>
            <li class="nav-item">
              <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
        <hr />
        <p><img alt="running shoe" src="images/shoe.png" width="150" height="125"/>
            <input type="text" id="steps" placeholder="Enter your steps" /></p>
        <h2>Daily Steps</h2>
        <p><img alt="apple" src="images/apple.png" width="150" height="125"/>
            <input type="text" id="calories" placeholder="Enter your calories" /></p>
        <h2>Daily Calories Intake</h2>
        <p><img alt="water" src="images/water.png" width="150" height="125"/>
            <input type="text" id="water" placeholder="Enter your water intake (oz)" /></p>
        <h2>Daily Water Intake</h2>
        <button type="submit">Submit</button>
    </main>
    <!--This is my Footer Section with my name and GitHub-->
    <footer class="d-md-flex p-5 bg-primary text-white text-center" id="footer-bot">
      <div class="container">
        <div class="d-sm-flex align-items-center justify-content-between">
          <div>
            <p class="lead">Viliami Mounga</p>
          </div>
          <div>
            <p>
              <a class="text-white" id="github-link" href="https://github.com/vilimounga/startup.git">My GitHub Repo</a>
            </p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
