    <nav class="navbar navbar-expand-lg bg-primary navbar-dark py-3">
      <div class="container">

        <button 
        class="navbar-toggler"

    <main>
      <section class="bg-dark text-white p-5 text-center">
        <div class="app"> 
          <h1>Welcome!</h1> 
          <h3>Record Your Data for Today</h3>
          <div class="inputs"> 
              <div> 
                  <label for="steps"> 
                        Daily Steps 
                    </label> 
                  <input id="steps" type="number"> 
              </div> 
              <div> 
                  <label for="calories"> 
                        Daily Calories 
                    </label> 
                  <input id="calories" type="number"> 
              </div> 
              <div> 
                  <label for="water"> 
                        Water Intake (fl oz.)
                    </label> 
                  <input id="calories" type="number"> 
              </div> 
          </div> 
          <button id="submit">Submit</button> 
          <div id="editSection" class="hidden"> 
              <button id="cancelEdit" onclick="cancelEdit()"> 
                    Cancel 
                </button> 
              <button id="updateEntry" onclick="editRow()"> 
                    Update 
                </button> 
          </div>
          </div>
      </section>

    </main>

    <!--This is my Footer Section with my name and GitHub-->
