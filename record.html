<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitnessPal</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="record.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark py-3">
      <div class="container">
        <a href="index.html" class="navbar-brand">FitnessPal</a>

        <button 
        class="navbar-toggler"
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navmenu"
        >
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="record.html" class="nav-link">Record</a>
            </li>
            <li class="nav-item">
              <a href="progress.html" class="nav-link">Progress</a>
            </li>
            <li class="nav-item">
              <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>

      <!--This is my Record Input Section-->
      <section class="bg-dark text-white p-5 h-100">
        <h1 class="text-center">Welcome!</h1>
        <h3 class="text-center">Record your numbers for Today!</h3>
        <div class="d-md-flex container justify-content-between align-items-center my-4">
          <div class="p-5">
            <img class="img-fluid d-none d-md-block mb-2" src="images/walking.svg" alt="fitness-tracker icon" />
            <h2 class="text-center">Steps</h2>
            <div class="input-group">
              <input type="text" class="form-control"
               placeholder="Enter your Steps">
            </div>
          </div>
          <div class="p-5">
            <img class="img-fluid d-none d-md-block mb-2 " src="images/cooking.svg" alt="fitness-tracker icon" />
            <h2 class="text-center">Calories</h2>
            <div class="input-group">
              <input type="text" class="form-control"
               placeholder="Enter your calories">
            </div>
          </div>
          <div class="p-5">
            <img class="img-fluid d-none d-md-block mb-2 " src="images/coffee.svg" alt="fitness-tracker icon" />
            <h2 class="text-center">Water Intake</h2>
            <div class="input-group">
              <input type="text" class="form-control"
               placeholder="Enter your Water Intake">
            </div>
          </div>
        </div>
        <div class="text-center">
          <button type="button" class="btn btn-primary btn-lg text-light">Submit</button>
        </div>
      </section>

    </main>

    <!--This is my Footer Section with my name and GitHub-->
    <footer class="bg-primary text-white align-items-center justify-content-between">
      <div class="container-fluid">
        <div class="container my-3">
          <span class="text-reset">Viliami Mounga</span>
          <a class="text-reset" href="https://github.com/vilimounga/startup.git">My GitHub Repo</a>
        </div>
      </div>
    </footer>
    
    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

  </body>
</html>
