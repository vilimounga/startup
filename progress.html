<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitnessPal</title>
    <link rel="stylesheet" href="main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
      <div class="container">
        <a href="index.html" class="navbar-brand">FitnessPal</a>

        <button 
        class="navbar-toggler"
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navmenu"
        >
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="record.html" class="nav-link">Record</a>
            </li>
            <li class="nav-item">
              <a href="progress.html" class="nav-link">Progress</a>
            </li>
            <li class="nav-item">
              <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
        <hr />
        <svg width="500" height="300">
            <!-- X axis -->
            <line x1="10" y1="250" x2="300" y2="250" style="stroke:black;stroke-width:2" />
            <!-- Y axis -->
            <line x1="10" y1="20" x2="10" y2="250" style="stroke:black;stroke-width:2" />
          
            <!-- X axis ticks and labels -->
            <line x1="110" y1="242" x2="110" y2="258" style="stroke:black;stroke-width:2" />
            <text x="110" y="270" font-family="Arial" font-size="12" fill="black" text-anchor="middle">Monday</text>
            <line x1="210" y1="242" x2="210" y2="258" style="stroke:black;stroke-width:2" />
            <text x="210" y="270" font-family="Arial" font-size="12" fill="black" text-anchor="middle">Tuesday</text>
          
            <!-- Corrected Y axis ticks and labels -->
            <line x1="5" y1="200" x2="15" y2="200" style="stroke:black;stroke-width:2" />
            <text x="20" y="205" font-family="Arial" font-size="12" fill="black" text-anchor="start">50</text> 
            <line x1="5" y1="100" x2="15" y2="100" style="stroke:black;stroke-width:2" />
            <text x="20" y="105" font-family="Arial" font-size="12" fill="black" text-anchor="start">100</text>
          
            <!--"calories" line-->
            <line x1="10" y1="250" x2="110" y2="180" style="stroke:red;stroke-width:2" />
            <!--"water" line-->
            <line x1="10" y1="250" x2="110" y2="115" style="stroke:blue;stroke-width:2" />
            <!--"steps" line-->
            <line x1="10" y1="250" x2="110" y2="60" style="stroke:green;stroke-width:2" />
          </svg>
        <h4>Red = Calories</h4>
        <h4>Blue = Water</h4>
        <h4>Green = Steps</h4>
        <p><i>"Real change, enduring change, happens one step at a time." - Ruth Bader Ginsburg</i></p>
    </main>

    <!--This is my Footer Section with my name and GitHub-->
    <footer class="d-md-flex p-5 bg-primary text-white text-center" id="footer-bot">
      <div class="container">
        <div class="d-sm-flex align-items-center justify-content-between">
          <div>
            <p class="lead">Viliami Mounga</p>
          </div>
          <div>
            <p>
              <a class="text-white" id="github-link" href="https://github.com/vilimounga/startup.git">My GitHub Repo</a>
            </p>
          </div>
        </div>
      </div>
    </footer>
    
  </body>
</html>
