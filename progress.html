    <link rel="stylesheet" href="main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"

      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />

  <body>
    <header class="bg-primary">
        <a href="index.html"><h1>FitnessPal</h1></a> 
            <ul class="nav-links">
              <li class="li_1"><a href="index.html">Login</a></li>
              <li class="li_1"><a href="record.html">Record</a></li>
              <li class="li_1"><a href="progress.html">Progress</a></li>
              <li class="li_1"><a href="leaderboard.html">Leaderboard</a></li>
            </ul>
          </div>
        </div>
    </header>
    <main>
        <hr />
        <svg width="500" height="300">
            <!-- X axis -->
            <line x1="10" y1="250" x2="300" y2="250" style="stroke:black;stroke-width:2" />
            <!-- Y axis -->
            <line x1="10" y1="20" x2="10" y2="250" style="stroke:black;stroke-width:2" />
          
            <!-- X axis ticks and labels -->
            <line x1="110" y1="242" x2="110" y2="258" style="stroke:black;stroke-width:2" />
            <text x="110" y="270" font-family="Arial" font-size="12" fill="black" text-anchor="middle">Monday</text>
            <line x1="210" y1="242" x2="210" y2="258" style="stroke:black;stroke-width:2" />
            <text x="210" y="270" font-family="Arial" font-size="12" fill="black" text-anchor="middle">Tuesday</text>
          
            <!-- Corrected Y axis ticks and labels -->
            <line x1="5" y1="200" x2="15" y2="200" style="stroke:black;stroke-width:2" />
            <text x="20" y="205" font-family="Arial" font-size="12" fill="black" text-anchor="start">50</text> 
            <line x1="5" y1="100" x2="15" y2="100" style="stroke:black;stroke-width:2" />
            <text x="20" y="105" font-family="Arial" font-size="12" fill="black" text-anchor="start">100</text>
          
            <!--"calories" line-->
            <line x1="10" y1="250" x2="110" y2="180" style="stroke:red;stroke-width:2" />
            <!--"water" line-->
            <line x1="10" y1="250" x2="110" y2="115" style="stroke:blue;stroke-width:2" />
            <!--"steps" line-->
            <line x1="10" y1="250" x2="110" y2="60" style="stroke:green;stroke-width:2" />
          </svg>
        <h4>Red = Calories</h4>
        <h4>Blue = Water</h4>
        <h4>Green = Steps</h4>
        <p><i>"Real change, enduring change, happens one step at a time." - Ruth Bader Ginsburg</i></p>
    </main>
    <footer>
        <hr />
        <p>Viliami Mounga</p>

    </footer>
  </body>
</html>
