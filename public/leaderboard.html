<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitnessPal</title>
    <link rel="stylesheet" href="leaderboard.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark py-3">
      <div class="container">
        <a href="index.html" class="navbar-brand">FitnessPal</a>

        <button 
        class="navbar-toggler"
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navmenu"
        >
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="record.html" class="nav-link">Record</a>
            </li>
            <li class="nav-item">
              <a href="progress.html" class="nav-link">Progress</a>
            </li>
            <li class="nav-item">
              <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="bg-dark text-center">
      <section>
      <div class="container">
      <table class="table table-striped table-hover table-bordered table-sm table-responsive-sm">
        <thead class="table-dark">
          <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Highest Number of Steps</th>
            <th scope="col">Date</th>
          </tr>
        </thead>
        <tbody class="table-group-divider bg-light text-center">
          <!--This is where the graph will dynamically update-->
        </tbody>
      </table>
      </div>
      </section>
    </main>

    <!--This is my Footer Section with my name and GitHub-->
    <footer class="bg-primary text-white align-items-center justify-content-between">
      <div class="container-fluid">
        <div class="container my-3">
          <span class="text-reset">Viliami Mounga</span>
          <a class="text-reset" href="https://github.com/vilimounga/startup.git">My GitHub Repo</a>
        </div>
      </div>
    </footer>

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

    <script src="leaderboard.js"></script>

  </body>
</html>
