<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitnessPal</title>
    <link rel="stylesheet" href="main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!--This is my Navigation Menu-->
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark py-3">
      <div class="container">
        <a href="index.html" class="navbar-brand">FitnessPal</a>

        <button 
        class="navbar-toggler"
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navmenu"
        >
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="record.html" class="nav-link">Record</a>
            </li>
            <li class="nav-item">
              <a href="progress.html" class="nav-link">Progress</a>
            </li>
            <li class="nav-item">
              <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!--This is my Display Section for this page-->
    <section class="bg-primary text-white p-5 p-lg-0 pt-lg-4 text-center text-sm-start" id="display">
      <div class="container">
        <div class="d-sm-flex align-items-center justify-content-between">
          <div>
            <h1>Meet your new <span class="text-warning">Best Friend</span></h1>
            <p class="lead my-4">
              Having trouble following those new year goals? We got a new powerful way
              for you to track your diet and fitness in a friendly game-style competition.
            </p>
            <button class="btn btn-warning btn-lg">Join Now!</button>
          </div>
          <img class="img-fluid w-50 d-none d-sm-block " src="images/fitness-tracker.svg" alt="fitness-tracker icon" />
        </div>
      </div>
    </section>

    <!--This is my user login section-->
    <section class="d-flex bg-dark text-light p-5 align-items-center justify-content-between" id="login-area">
      <div class="container">
        <div class="d-md-flex justify-content-between align-items-center">
          <h3 class="mb-3 mb-md-0 col-6">Let's Get Started!</h3>

          <div class="input-group mb-3">
            <input 
              type="text" 
              class="form-control col-sm-12" 
              placeholder="Enter name">

            <button 
              class="btn btn-primary" 
              type="button" 
              id="button-addon2"
              >
              LOG IN
            </button>
          </div>

        </div>
      </div>
    </section>

    <!--This is my Footer Section with my name and GitHub-->
    <footer class="d-md-flex p-5 bg-primary text-white text-center" id="footer-bot">
      <div class="container">
        <div class="d-sm-flex align-items-center justify-content-between">
          <div>
            <p class="lead">Viliami Mounga</p>
          </div>
          <div>
            <p>
              <a class="text-white" id="github-link" href="https://github.com/vilimounga/startup.git">My GitHub Repo</a>
            </p>
          </div>
        </div>
      </div>
    </footer>

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  </body>
</html>
